{% extends 'base.html' %}

{% block title %}{% block auth_title %}Autenticação{% endblock %} | Finanpy{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-950 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="{% url 'landing' %}" class="inline-block">
                <span class="text-3xl font-bold bg-gradient-to-r from-emerald-400 to-violet-400 bg-clip-text text-transparent">
                    Finanpy
                </span>
            </a>
            <p class="text-sm text-gray-500 mt-1">Controle financeiro inteligente</p>
        </div>

        <!-- Card central -->
        <div class="bg-gray-900 border border-gray-700 rounded-xl shadow-xl p-8">
            {% block auth_content %}{% endblock %}
        </div>

    </div>
</div>
{% endblock %}
